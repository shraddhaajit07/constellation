<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellation Hero</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }
  #sky {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<script>
(function () {
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');

  // ---- Config ----
  const STAR_COUNT = 72;
  const ACTIVATE_RADIUS = 160;   // how close cursor must be to wake a star
  const LINK_RADIUS = 130;       // how close two active stars must be to link
  const MAX_LINKS_PER_STAR = 2;  // keeps constellations sparse, not a mesh
  const GOLD = '181, 136, 62';    // warm amber-gold, reads clearly on white
  const STARLIGHT = '128, 130, 158'; // muted lavender-gray, echoes your logo star
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let width, height, dpr;
  let stars = [];
  let mouse = { x: -9999, y: -9999, active: false };

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    initStars();
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * width,
        y: Math.random() * height,
        r: 0.8 + Math.random() * 1.4,
        phase: Math.random() * Math.PI * 2,
        speed: 0.4 + Math.random() * 0.6,
        baseAlpha: 0.3 + Math.random() * 0.35,
        activation: 0
      });
    }
  }

  function draw(time) {
    ctx.clearRect(0, 0, width, height);

    const active = [];

    // update + draw stars
    for (const s of stars) {
      const twinkle = prefersReducedMotion
        ? 0
        : Math.sin(time * 0.001 * s.speed + s.phase) * 0.15;

      const dx = mouse.x - s.x;
      const dy = mouse.y - s.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const targetActivation = mouse.active && dist < ACTIVATE_RADIUS
        ? 1 - dist / ACTIVATE_RADIUS
        : 0;

      s.activation += (targetActivation - s.activation) * 0.08;
      if (s.activation > 0.05) active.push(s);

      const alpha = Math.min(1, s.baseAlpha + twinkle + s.activation * 0.9);
      const radius = s.r + s.activation * 1.8;

      if (s.activation > 0.15) {
        const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, radius * 5);
        glow.addColorStop(0, `rgba(${GOLD}, ${0.25 * s.activation})`);
        glow.addColorStop(1, 'rgba(212, 175, 122, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(s.x, s.y, radius * 5, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(s.x, s.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${STARLIGHT}, ${alpha})`;
      ctx.fill();
    }

    // draw links between nearby active stars
    ctx.lineWidth = 0.6;
    for (let i = 0; i < active.length; i++) {
      const a = active[i];
      const dists = [];
      for (let j = 0; j < active.length; j++) {
        if (i === j) continue;
        const b = active[j];
        const d = Math.hypot(a.x - b.x, a.y - b.y);
        if (d < LINK_RADIUS) dists.push({ b, d });
      }
      dists.sort((p, q) => p.d - q.d);
      const links = dists.slice(0, MAX_LINKS_PER_STAR);
      for (const { b, d } of links) {
        const strength = Math.min(a.activation, b.activation) * (1 - d / LINK_RADIUS);
        ctx.strokeStyle = `rgba(${GOLD}, ${strength * 0.6})`;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    requestAnimationFrame(draw);
  }

  function setMouse(x, y, active) {
    mouse.x = x;
    mouse.y = y;
    mouse.active = active;
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', (e) => setMouse(e.clientX, e.clientY, true));
  window.addEventListener('mouseleave', () => setMouse(-9999, -9999, false));
  window.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
      setMouse(e.touches[0].clientX, e.touches[0].clientY, true);
    }
  }, { passive: true });
  window.addEventListener('touchend', () => setMouse(-9999, -9999, false));

  resize();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
